node_mappings:
  - name: ncbigene.genes
    source: ncbigene_genes
    mode: create
    target_class: Gene
    iri_column: GeneID
    properties:
      - column: GeneID
        property: geneId
      - column: Symbol
        property: geneSymbol
      - column: Synonyms
        property: synonyms
      - column: description
        property: description
      - column: chromosome
        property: chromosome
      - column: type_of_gene
        property: geneType
      - column: Full_name_from_nomenclature_authority
        property: geneName
      - column: xref_HGNC
        property: xrefHGNC
      - column: xref_Ensembl
        property: xrefEnsembl
      - column: xref_MIM
        property: xrefOMIM
  - name: disease_ontology.slim_terms
    source: disease_ontology_slim_terms
    mode: create
    target_class: Disease
    iri_column: doid
    properties:
      - column: doid
        property: xrefDiseaseOntology
      - column: disease_name
        property: diseaseName
      - column: definition
        property: definition
      - column: umls_cui
        property: xrefUmlsCUI
      - column: symptoms
        property: symptoms
      - column: synonyms
        property: synonyms
  - name: drugcentral.drugs
    source: drugcentral_drugs
    mode: create
    target_class: Drug
    iri_column: struct_id
    properties:
      - column: struct_id
        property: drugId
      - column: drugbank_id
        property: xrefDrugBank
      - column: drug_name
        property: commonName
      - column: molecular_weight
        property: molecularWeight
      - column: molecular_formula
        property: molecularFormula
      - column: smiles
        property: smiles
      - column: inchi
        property: inchi
      - column: inchikey
        property: inchiKey
      - column: mesh_id
        property: xrefMeSH
      - column: umls_cui
        property: xrefUmlsCUI
      - column: chebi_id
        property: xrefCheBI
      - column: pubchem_cid
        property: xrefPubChem
      - column: cas_number
        property: xrefCAS
  - name: drugcentral.pharmacologic_classes
    source: drugcentral_pharmacologic_classes
    mode: create
    target_class: PharmacologicClass
    iri_column: pharma_class_id
    properties:
      - column: pharma_class_id
        property: classId
      - column: pharma_class_name
        property: className
      - column: pharma_class_code
        property: classCode
  - name: ctd.chemical_nodes
    source: ctd_chemical_nodes
    mode: create
    target_class: Drug
    iri_column: chemical_id
    properties:
      - column: chemical_id
        property: drugId
      - column: chemical_name
        property: commonName
      - column: mesh_id
        property: xrefMeSH
  - name: drugbank.drugs
    source: drugbank_drugs
    mode: create
    target_class: Drug
    iri_column: drugbankId
    properties:
      - column: drugbankId
        property: xrefDrugBank
      - column: commonName
        property: commonName
      - column: casNumber
        property: xrefCAS
      - column: synonyms
        property: synonyms
      - column: inchiKey
        property: inchiKey
  - name: gene_ontology.biological_process_nodes
    source: gene_ontology_biological_process_nodes
    mode: create
    target_class: BiologicalProcess
    iri_column: go_id
    properties:
      - column: go_id
        property: geneOntologyId
      - column: name
        property: processName
      - column: definition
        property: definition
  - name: gene_ontology.molecular_function_nodes
    source: gene_ontology_molecular_function_nodes
    mode: create
    target_class: MolecularFunction
    iri_column: go_id
    properties:
      - column: go_id
        property: geneOntologyId
      - column: name
        property: functionName
      - column: definition
        property: definition
  - name: gene_ontology.cellular_component_nodes
    source: gene_ontology_cellular_component_nodes
    mode: create
    target_class: CellularComponent
    iri_column: go_id
    properties:
      - column: go_id
        property: geneOntologyId
      - column: name
        property: componentName
      - column: definition
        property: definition
  - name: uberon.uberon_nodes
    source: uberon_uberon_nodes
    mode: create
    target_class: BodyPart
    iri_column: uberon_id
    properties:
      - column: uberon_id
        property: xrefUberon
      - column: uberon_name
        property: bodyPartName
      - column: synonyms
        property: synonyms
      - column: definition
        property: definition
      - column: mesh_id
        property: xrefMeSH
      - column: fma_id
        property: xrefFMA
      - column: is_human
        property: isHuman
  - name: mesh.symptom_nodes
    source: mesh_symptom_nodes
    mode: create
    target_class: Symptom
    iri_column: mesh_id
    properties:
      - column: mesh_id
        property: xrefMeSH
      - column: mesh_name
        property: symptomName
  - name: hpo.phenotype_nodes
    source: hpo_phenotype_nodes
    mode: create
    target_class: Phenotype
    iri_column: hp_id
    properties:
      - column: hp_id
        property: xrefHPO
      - column: hp_name
        property: phenotypeName
      - column: definition
        property: definition
      - column: synonyms
        property: synonyms
      - column: is_a
        property: isA
  - name: sider.side_effect_nodes
    source: sider_side_effect_nodes
    mode: create
    target_class: SideEffect
    iri_column: xrefUmlsCUI
    properties:
      - column: xrefUmlsCUI
        property: xrefUmlsCUI
      - column: sideEffectName
        property: sideEffectName
  - name: reactome.pathways
    source: reactome_pathways
    mode: create
    target_class: Pathway
    iri_column: reactomeId
    properties:
      - column: reactomeId
        property: pathwayId
      - column: pathwayName
        property: pathwayName
      - column: species
        property: species
  - name: dorothea.transcription_factors
    source: dorothea_transcription_factors
    mode: create
    target_class: TranscriptionFactor
    iri_column: TF
    properties:
      - column: TF
        property: tfSymbol
  - name: hgnc.gene_family_nodes
    source: hgnc_gene_family_nodes
    mode: create
    target_class: GeneFamily
    iri_column: family_id
    properties:
      - column: family_id
        property: familyId
      - column: family_name
        property: familyName
  - name: clinvar.variant_nodes
    source: clinvar_variant_nodes
    mode: create
    target_class: Variant
    iri_column: allele_id
    properties:
      - column: allele_id
        property: alleleId
      - column: variation_id
        property: variantId
      - column: variant_name
        property: variantName
      - column: variant_type
        property: variantType
      - column: clinical_significance
        property: clinicalSignificance
      - column: review_status
        property: reviewStatus
      - column: chromosome
        property: chromosome
      - column: start_pos
        property: startPosition
      - column: stop_pos
        property: stopPosition
      - column: ref_allele
        property: refAllele
      - column: alt_allele
        property: altAllele
      - column: dbsnp_id
        property: xrefDbSNP
  - name: clinicaltrials.trial_nodes
    source: clinicaltrials_trial_nodes
    mode: create
    target_class: ClinicalTrial
    iri_column: nct_id
    properties:
      - column: nct_id
        property: trialId
      - column: brief_title
        property: title
      - column: official_title
        property: officialTitle
      - column: status
        property: status
      - column: phase
        property: phase
      - column: study_type
        property: studyType
      - column: start_date
        property: startDate
      - column: completion_date
        property: completionDate
      - column: sponsor
        property: sponsor
      - column: enrollment
        property: enrollment
  - name: clinpgx.drug_label_nodes
    source: clinpgx_drug_label_nodes
    mode: create
    target_class: DrugLabel
    iri_column: guideline_id
    properties:
      - column: guideline_id
        property: labelId
      - column: guideline_name
        property: labelName
      - column: url
        property: url
      - column: version
        property: version

source_labels:
  opentargets: "OpenTargets"
  pubtator: "PubTator"
  string: "STRING"
  lincs: "LINCS L1000"
  gene_ontology: "Gene Ontology"
  reactome: "Reactome"
  hpo: "HPO"
  bgee: "Bgee"
  hgnc: "HGNC"
  clinvar: "ClinVar"
  dorothea: "DoRothEA"
  bindingdb: "BindingDB"
  drugbank: "DrugBank"
  ctd: "CTD"
  drugcentral: "DrugCentral"
  sider: "SIDER"
  clinicaltrials: "ClinicalTrials.gov"
  clinpgx: "ClinPGx"

relationship_mappings:
  - name: opentargets.target_disease_associations
    source: opentargets_target_disease_associations
    relationship: geneAssociatesWithDisease
    subject:
      class_name: Gene
      column: gene_symbol
      match_property: geneSymbol
    object:
      class_name: Disease
      column: disease_id
      match_property: xrefDiseaseOntology
  - name: pubtator.pubtator_gene_disease
    source: pubtator_pubtator_gene_disease
    relationship: geneAssociatesWithDisease
    subject:
      class_name: Gene
      column: gene_symbol
      match_property: geneSymbol
    object:
      class_name: Disease
      column: disease_id
      match_property: xrefDiseaseOntology
  - name: string.gene_interactions
    source: string_gene_interactions
    relationship: geneInteractsWithGene
    subject:
      class_name: Gene
      column: gene1
      match_property: geneSymbol
    object:
      class_name: Gene
      column: gene2
      match_property: geneSymbol
  - name: lincs.compound_gene_up
    source: lincs_compound_gene_up
    relationship: compoundUpregulatesGene
    subject:
      class_name: Drug
      column: compound_name
      match_property: commonName
    object:
      class_name: Gene
      column: gene_symbol
      match_property: geneSymbol
  - name: lincs.compound_gene_down
    source: lincs_compound_gene_down
    relationship: compoundDownregulatesGene
    subject:
      class_name: Drug
      column: compound_name
      match_property: commonName
    object:
      class_name: Gene
      column: gene_symbol
      match_property: geneSymbol
  - name: gene_ontology.gene_bp_associations
    source: gene_ontology_gene_bp_associations
    relationship: geneParticipatesInBiologicalProcess
    subject:
      class_name: Gene
      column: gene_symbol
      match_property: geneSymbol
    object:
      class_name: BiologicalProcess
      column: go_id
      match_property: geneOntologyId
  - name: gene_ontology.gene_mf_associations
    source: gene_ontology_gene_mf_associations
    relationship: geneHasMolecularFunction
    subject:
      class_name: Gene
      column: gene_symbol
      match_property: geneSymbol
    object:
      class_name: MolecularFunction
      column: go_id
      match_property: geneOntologyId
  - name: gene_ontology.gene_cc_associations
    source: gene_ontology_gene_cc_associations
    relationship: geneAssociatedWithCellularComponent
    subject:
      class_name: Gene
      column: gene_symbol
      match_property: geneSymbol
    object:
      class_name: CellularComponent
      column: go_id
      match_property: geneOntologyId
  - name: reactome.ncbi_gene_pathway_relationships
    source: reactome_ncbi_gene_pathway_relationships
    relationship: geneInPathway
    subject:
      class_name: Gene
      column: ncbi_gene_id
      match_property: geneId
    object:
      class_name: Pathway
      column: reactome_id
      match_property: pathwayId
  - name: hpo.gene_phenotype_associations
    source: hpo_gene_phenotype_associations
    relationship: geneAssociatesWithPhenotype
    subject:
      class_name: Gene
      column: ncbi_gene_id
      match_property: geneId
    object:
      class_name: Phenotype
      column: hp_id
      match_property: xrefHPO
  - name: bgee.anatomy_expresses_gene
    source: bgee_anatomy_expresses_gene
    relationship: bodyPartOverexpressesGene
    subject:
      class_name: BodyPart
      column: uberon_id
      match_property: xrefUberon
    object:
      class_name: Gene
      column: ensembl_gene_id
      match_property: xrefEnsembl
  - name: hgnc.gene_family_associations
    source: hgnc_gene_family_associations
    relationship: geneInFamily
    subject:
      class_name: Gene
      column: ncbi_gene_id
      match_property: geneId
    object:
      class_name: GeneFamily
      column: family_id
      match_property: familyId
  - name: clinvar.variant_gene_associations
    source: clinvar_variant_gene_associations
    relationship: variantInGene
    subject:
      class_name: Variant
      column: allele_id
      match_property: alleleId
    object:
      class_name: Gene
      column: gene_id
      match_property: geneId
  - name: clinvar.variant_disease_associations
    source: clinvar_variant_disease_associations
    relationship: variantAssociatedWithDisease
    subject:
      class_name: Variant
      column: variant_id
      match_property: alleleId
    object:
      class_name: Disease
      column: umls_cui
      match_property: xrefUmlsCUI
  - name: dorothea.tf_gene_interactions
    source: dorothea_tf_gene_interactions
    relationship: transcriptionFactorInteractsWithGene
    subject:
      class_name: TranscriptionFactor
      column: tf_symbol
      match_property: tfSymbol
    object:
      class_name: Gene
      column: target_gene
      match_property: geneSymbol
  - name: bindingdb.drug_binds_gene
    source: bindingdb_drug_binds_gene
    relationship: chemicalBindsGene
    subject:
      class_name: Drug
      column: drugbank_id
      match_property: xrefDrugBank
    object:
      class_name: Gene
      column: gene_symbol
      match_property: geneSymbol
  - name: drugbank.drug_gene_edges
    source: drugbank_drug_gene_edges
    relationship: drugBindsGene
    subject:
      class_name: Drug
      column: drugbank_id
      match_property: xrefDrugBank
    object:
      class_name: Gene
      column: gene_symbol
      match_property: geneSymbol
  - name: ctd.chemical_increases_expression
    source: ctd_chemical_increases_expression
    relationship: chemicalIncreasesExpression
    subject:
      class_name: Drug
      column: drugName
      match_property: commonName
    object:
      class_name: Gene
      column: geneSymbol
      match_property: geneSymbol
  - name: ctd.chemical_decreases_expression
    source: ctd_chemical_decreases_expression
    relationship: chemicalDecreasesExpression
    subject:
      class_name: Drug
      column: drugName
      match_property: commonName
    object:
      class_name: Gene
      column: geneSymbol
      match_property: geneSymbol
  - name: drugcentral.drug_in_class
    source: drugcentral_drug_in_class
    relationship: compoundInPharmacologicClass
    subject:
      class_name: Drug
      column: struct_id
      match_property: drugId
    object:
      class_name: PharmacologicClass
      column: pharma_class_id
      match_property: classId
  - name: sider.drug_side_effect_associations
    source: sider_drug_side_effect_associations
    relationship: compoundCausesSideEffect
    subject:
      class_name: Drug
      column: pubchem_cid
      match_property: xrefPubChem
    object:
      class_name: SideEffect
      column: umls_id
      match_property: xrefUmlsCUI
  - name: clinicaltrials.trial_disease_associations
    source: clinicaltrials_trial_disease_associations
    relationship: STUDIES_CONDITION
    subject:
      class_name: ClinicalTrial
      column: nct_id
      match_property: trialId
    object:
      class_name: Disease
      column: disease_id
      match_property: xrefDiseaseOntology
  - name: clinicaltrials.trial_intervention_associations
    source: clinicaltrials_trial_intervention_associations
    relationship: TESTS_INTERVENTION
    subject:
      class_name: ClinicalTrial
      column: nct_id
      match_property: trialId
    object:
      class_name: Drug
      column: intervention_name
      match_property: commonName
  - name: clinpgx.gene_drug_interactions
    source: clinpgx_gene_drug_interactions
    relationship: AFFECTS_RESPONSE_TO
    subject:
      class_name: Gene
      column: gene_symbol
      match_property: geneSymbol
    object:
      class_name: Drug
      column: drug_name
      match_property: commonName
