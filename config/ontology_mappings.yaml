# CardioKB Ontology Mappings Configuration
# Maps TSV columns from 24 data sources to OWL node types and relationship types
# Node entries are listed BEFORE relationship entries
# All owl_class and owl_relationship values must match project.yaml node_types/edge_types exactly

# ============================================================================
# NODE MAPPINGS (LISTED FIRST)
# ============================================================================

# NCBI Gene - Human genes
ncbigene.genes:
  data_type: node
  owl_class: Gene
  source: ncbigene
  source_filename: genes.tsv
  id_column: GeneID
  id_prefix: NCBIGene
  property_map:
    GeneID: geneId
    Symbol: geneSymbol
    Synonyms: synonyms
    description: description
    chromosome: chromosome
    type_of_gene: geneType
    Full_name_from_nomenclature_authority: geneName
    xref_HGNC: xrefHGNC
    xref_Ensembl: xrefEnsembl
    xref_MIM: xrefOMIM

# Disease Ontology - Disease terms
disease_ontology.slim_terms:
  data_type: node
  owl_class: Disease
  source: disease_ontology
  source_filename: slim_terms.tsv
  id_column: doid
  id_prefix: DOID
  property_map:
    doid: xrefDiseaseOntology
    disease_name: diseaseName
    definition: definition
    umls_cui: xrefUmlsCUI
    symptoms: symptoms
    synonyms: synonyms

