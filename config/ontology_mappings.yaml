    drug_name: commonName
    molecular_weight: molecularWeight
    molecular_formula: molecularFormula
    smiles: smiles
    inchi: inchi
    inchikey: inchiKey
    mesh_id: xrefMeSH
    umls_cui: xrefUmlsCUI
    chebi_id: xrefCheBI
    pubchem_cid: xrefPubChem
    cas_number: xrefCAS

