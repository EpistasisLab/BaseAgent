# ============================================================================
# CROSS-REFERENCE AND MERGE RULES
# ============================================================================

cross_references:
  Gene:
    primary_id: NCBIGene
    alternate_ids:
      - Ensembl
      - HGNC
      - Gene_Symbol
    merge_keys:
      - geneSymbol
      - xrefNcbiGene
      - xrefEnsembl
      - xrefHGNC

  Disease:
    primary_id: DOID
    alternate_ids:
      - UMLS
      - MeSH
    merge_keys:
      - xrefDiseaseOntology
      - xrefUmlsCUI
      - xrefMeSH

  Drug:
    primary_id: DrugBank
    alternate_ids:
      - DrugCentral
      - CTD
      - PubChem
      - MeSH
    merge_keys:
      - xrefDrugBank
      - commonName
      - xrefPubChem
      - xrefMeSH
      - xrefCAS

  BodyPart:
    primary_id: UBERON
    alternate_ids:
      - MeSH
      - FMA
    merge_keys:
      - xrefUberon
      - xrefMeSH
      - xrefFMA

  Phenotype:
    primary_id: HP
    alternate_ids:
      - MeSH
    merge_keys:
      - xrefHPO
      - xrefMeSH

  Variant:
    primary_id: ClinVar
    alternate_ids:
      - dbSNP
    merge_keys:
      - variantId
      - xrefDbSNP

  Pathway:
    primary_id: Reactome
    merge_keys:
      - pathwayId
      - pathwayName

  BiologicalProcess:
    primary_id: GO
    merge_keys:
      - geneOntologyId

  MolecularFunction:
    primary_id: GO
    merge_keys:
      - geneOntologyId

  CellularComponent:
    primary_id: GO
    merge_keys:
      - geneOntologyId

  SideEffect:
    primary_id: UMLS
    merge_keys:
      - xrefUmlsCUI

  Symptom:
    primary_id: MeSH
    merge_keys:
      - xrefMeSH

  TranscriptionFactor:
    primary_id: HGNC
    merge_keys:
      - tfSymbol

  GeneFamily:
    primary_id: HGNC
    merge_keys:
      - familyId

  PharmacologicClass:
    primary_id: DrugCentralPharmClass
    merge_keys:
      - classId

  ClinicalTrial:
    primary_id: NCT
    merge_keys:
      - trialId

  DrugLabel:
    primary_id: ClinPGx
    merge_keys:
      - labelId

# ============================================================================
# DATA SOURCE METADATA
# ============================================================================

sources:
  ncbigene:
    display_name: NCBI Gene
    description: Human gene information from NCBI Gene database
    node_count: 194553

  disease_ontology:
    display_name: Disease Ontology
    description: Structured controlled vocabulary of disease concepts
    node_count: 12012

  drugcentral:
    display_name: DrugCentral
    description: Drug information, pharmacology, and classification
    node_count: 24414

  gene_ontology:
    display_name: Gene Ontology
    description: Controlled vocabulary for gene products (BP, MF, CC)
    node_count: 38739

  uberon:
    display_name: Uberon
    description: Unified anatomy ontology for anatomical structures
    node_count: 14937

  mesh:
    display_name: MeSH
    description: Medical Subject Headings for symptoms and disease terms
    node_count: 966

  hpo:
    display_name: Human Phenotype Ontology
    description: Standardized vocabulary for human phenotypes
    node_count: 19389

