  node_properties:
    # Drug/Chemical properties
    Drug:
      - commonName
      - xrefDrugbank
      - xrefDTXSID
      - drugDescription
      - drugType
      - drugGroups
      - drugCategories
      - drugIndication
      - drugPharmacology
      - drugMechanism
      - drugToxicity
      - drugHalfLife
      - drugState
      - molecularFormula
      - molecularWeight
    
    # Disease properties
    Disease:
      - commonName
      - xrefUmlsCUI
      - xrefDiseaseOntology
      - xrefMeSH
      - xrefOMIM
      - xrefNCIT
      - xrefICD10CM
      - xrefICD9CM
      - xrefORDO
      - xrefGARD
      - xrefSNOMED
      - diseaseDescription
      - diseaseSymptoms
    
    # Gene properties
    Gene:
      - geneSymbol
      - xrefNcbiGene
      - geneName
      - xrefUniProtId
      - geneExpression
      - geneExpressionCallQuality
      - geneExpressionFDR
      - geneExpressionScore
      - geneExpressionRank
      - chromosome
      - typeOfGene
    
    # Pathway properties
    Pathway:
      - pathwayName
      - pathwayId
      - xrefReactomePathway
      - species

    # BodyPart properties
    BodyPart:
      - xrefUberon
      - commonName
      - synonym
      - definition
      - xrefMeSH
      - xrefFMA
    
    # DrugClass properties
    DrugClass:
      - pharma_class_name
      - pharma_class_code
      - xrefDrugCentralPharmClass
    
    # ChemicalEffect properties
    ChemicalEffect:
      - commonName
      - xrefMedDRA
    
    # Symptom properties
    Symptom:
      - commonName
      - xrefMeSH
      - sourceDatabase

  edge_properties:
    geneAssociatesWithDisease:
      - gdaScore
      - evidenceIndex
      - numberOfPublications
      - numberOfSnps
      - sourceDatabase

    anatomyExpressesGene:
      - expressionCall
      - callQuality
      - fdr
      - expressionScore
      - expressionRank
      - unbiased
      - sourceDatabase

    chemicalBindsGene:
      - interactionType
      - sourceDatabase

    drugTreatsDisease:
      - indication
      - sourceDatabase

    chemicalCausesEffect:
      - support
      - sourceDatabase

    geneParticipatesInBiologicalProcess:
