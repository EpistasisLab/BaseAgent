      - pFisher
      - enrichment
      - oddsRatio
      - sourceDatabase

    diseaseLocalizesToAnatomy:
      - cooccurrence
      - pFisher
      - enrichment
      - oddsRatio
      - sourceDatabase

    diseaseAssociatesWithDisease:
      - cooccurrence
      - pFisher
      - enrichment
      - oddsRatio
      - sourceDatabase

    geneInteractsWithGene:
      - combinedScore
      - sourceDatabase

    transcriptionFactorInteractsWithGene:
      - sourceDatabase

    drugInClass:
      - sourceDatabase

