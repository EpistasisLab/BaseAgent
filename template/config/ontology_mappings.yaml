  drugcentral.drugs:
    data_type: node
    node_type: Drug
    source_filename: drugs.tsv
    merge: true
    skip: false
    parse_config:
      headers: true
      iri_column_name: struct_id
      data_property_map:
        struct_id: xrefDrugCentralID
        cas_number: xrefCasRN
        drug_name: commonName
        inchi: drugInChI
        inchikey: inchiKey
        smiles: drugSMILES
        molecular_weight: drugMolecularWeight
        molecular_formula: drugMolecularFormula
        logp: drugLogP
        tpsa: drugTPSA
        lipinski_compliance: drugLipinskiCompliance
        chebi_id: xrefChEBI
        pubchem_cid: xrefPubchemCID
        mesh_id: xrefMeSH
        source_database: sourceDatabase
      merge_column:
        source_column_name: cas_number
        data_property: xrefCasRN

  drugcentral.pharmacologic_classes:
    data_type: node
    node_type: DrugClass
    source_filename: pharmacologic_classes.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: pharma_class_id
      data_property_map:
        pharma_class_id: xrefDrugCentralPharmClass
        pharma_class_name: pharma_class_name
        pharma_class_code: pharma_class_code
        source_database: sourceDatabase

  drugcentral.chemical_effects:
    data_type: node
    node_type: ChemicalEffect
    source_filename: chemical_causes_effect.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: adverse_effect_id
      data_property_map:
        adverse_effect_id: xrefMedDRA
        adverse_effect_name: commonName
        source_database: sourceDatabase
      unique_rows: true

  # ---------------------------------------------------------------------------
  # Gene Ontology - Biological Processes
  # ---------------------------------------------------------------------------
  gene_ontology.biological_process_nodes:
    data_type: node
    node_type: BiologicalProcess
    source_filename: biological_process_nodes.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: go_id
      data_property_map:
        go_id: xrefGeneOntology
        name: commonName
        definition: definition
        source_database: sourceDatabase

  # ---------------------------------------------------------------------------
  # Gene Ontology - Molecular Functions
  # ---------------------------------------------------------------------------
  gene_ontology.molecular_function_nodes:
    data_type: node
    node_type: MolecularFunction
    source_filename: molecular_function_nodes.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: go_id
      data_property_map:
        go_id: xrefGeneOntology
        name: commonName
