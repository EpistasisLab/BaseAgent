      subject_column_name: chemical_id
      subject_match_property: xrefMeSHSupplementary
      subject_node_type: Drug
      object_column_name: gene_id
      object_match_property: xrefNcbiGene
      object_node_type: Gene
      data_property_map:
        interaction_text: interactionText
        organism: organism
        pubmed_ids: pubmedIds
        source_database: sourceDatabase
    source_filename: chemical_increases_expression.tsv
    skip: false

  ctd.chemical_decreases_expression:
    data_type: relationship
    relationship_type: chemicalDecreasesExpression
    parse_config:
      headers: true
      subject_column_name: chemical_id
      subject_match_property: xrefMeSHSupplementary
      subject_node_type: Drug
      object_column_name: gene_id
      object_match_property: xrefNcbiGene
      object_node_type: Gene
      data_property_map:
        interaction_text: interactionText
        organism: organism
        pubmed_ids: pubmedIds
        source_database: sourceDatabase
    source_filename: chemical_decreases_expression.tsv
    skip: false

  # ---------------------------------------------------------------------------
  # Reactome - Gene-Pathway Relationships
  # ---------------------------------------------------------------------------
  reactome.ncbi_gene_pathway_relationships:
    data_type: relationship
    relationship_type: geneInPathway
    inverse_relationship_type: pathwayContainsGene
    source_filename: ncbi_gene_pathway_relationships.tsv
    merge: true
