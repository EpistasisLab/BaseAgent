# KG Ontology Mapping Configuration
# This file defines how extracted data maps to ontology nodes and relationships.
#
# Config keys use format: {source_name}.{data_name}
# Property names are strings resolved to ontology objects at runtime by the populator.
#
# data_type: "node" or "relationship"
# For nodes: node_type, source_filename, parse_config (iri_column_name, data_property_map, merge_column)
# For relationships: relationship_type, inverse_relationship_type, source_filename, parse_config
#   (subject_node_type, subject_column_name, subject_match_property,
#    object_node_type, object_column_name, object_match_property)
#
# IMPORTANT: All node entries must appear before relationship entries.
# ista matches relationships against already-loaded individuals, so any
# relationship processed before its subject/object nodes exist will silently
# produce zero edges.

mappings:

  # ===========================================================================
  # NODE POPULATIONS
  # Must all come before relationship entries.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # NCBI Gene - Gene Information (loaded first; many relationships depend on it)
  # ---------------------------------------------------------------------------
  ncbigene.genes:
    data_type: node
    node_type: Gene
    source_filename: genes.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: Symbol
      compound_fields:
        dbXrefs:
          delimiter: "|"
          field_split_prefix: ":"
      data_property_map:
        GeneID: xrefNcbiGene
        Symbol: geneSymbol
        type_of_gene: typeOfGene
        Full_name_from_nomenclature_authority: commonName
        xref_MIM: xrefOMIM
        xref_HGNC: xrefHGNC
        xref_Ensembl: xrefEnsembl
        chromosome: chromosome
        source_database: sourceDatabase

  # ---------------------------------------------------------------------------
  # Reactome - Pathway Information
  # ---------------------------------------------------------------------------
  reactome.pathways:
    data_type: node
    node_type: Pathway
    source_filename: pathways.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: reactome_id
      data_property_map:
        reactome_id: xrefReactomePathway
        pathway_name: pathwayName
        species: species
        source_database: sourceDatabase


  # ---------------------------------------------------------------------------
  # Disease Ontology - Slim Terms (Top Cancer Nodes + common GWAS Catalog diseases)
  # ---------------------------------------------------------------------------
  disease_ontology.disease_nodes:
    data_type: node
    node_type: Disease
    source_filename: slim_terms.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: doid
      data_property_map:
        doid: xrefDiseaseOntology
        disease_name: commonName
        definition: diseaseDescription
        umls_cui: xrefUmlsCUI
        mesh_id: xrefMeSH
        omim_id: xrefOMIM
        ncit_id: xrefNCIT
        icd10cm: xrefICD10CM
        icd9cm: xrefICD9CM
        ordo_id: xrefORDO
        gard_id: xrefGARD
        snomed_id: xrefSNOMED
        symptoms: diseaseSymptoms
        source_database: sourceDatabase

  # ---------------------------------------------------------------------------
  # DisGeNET - Gene-Disease Associations
  # ---------------------------------------------------------------------------
  disgenet.diseases:
    data_type: node
    node_type: Disease
    source_filename: diseases.tsv
    merge: true
    skip: false
    parse_config:
      headers: true
      iri_column_name: diseaseId
      merge_column:
        source_column_name: diseaseId
        data_property: xrefUmlsCUI
      data_property_map:
        diseaseId: xrefUmlsCUI
        diseaseName: commonName
        DO: xrefDiseaseOntology
        source_database: sourceDatabase

  disgenet.genes:
    data_type: node
    node_type: Gene
    source_filename: genes.tsv
    merge: true
    skip: false
    parse_config:
      headers: true
      iri_column_name: geneId
      data_property_map:
        geneSymbol: geneSymbol
        ensemblId: xrefEnsembl
        proteinId: xrefUniProtId
        pLI: pLiScore
        DSI: diseaseSpecificityIndex
        DPI: diseasePleiotropyIndex
        source_database: sourceDatabase
      merge_column:
        source_column_name: geneId
        data_property: xrefNcbiGene

  # ---------------------------------------------------------------------------
  # DrugBank - Drug Information
  # ---------------------------------------------------------------------------
  drugbank.drugs:
    data_type: node
    node_type: Drug
    source_filename: drugs.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: drugbank_id
      data_property_map:
        drugbank_id: xrefDrugbank
        cas_number: xrefCasRN
        drug_name: commonName
        inchikey: inchiKey
        source_database: sourceDatabase

  # ---------------------------------------------------------------------------
  # CollectTRI - Transcription Factor Regulatory Network
  # ---------------------------------------------------------------------------
  collectri.transcription_factors:
    data_type: node
    node_type: TranscriptionFactor
    source_filename: transcription_factors.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: tf_symbol
      data_property_map:
        tf_symbol: TF
        source_database: sourceDatabase

  # ---------------------------------------------------------------------------
  # Uberon
  # ---------------------------------------------------------------------------
  uberon.anatomy:
    data_type: node
    node_type: BodyPart
    source_filename: uberon_nodes.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: uberon_id
      data_property_map:
        uberon_id: xrefUberon
        uberon_name: commonName
        definition: definition
        synonyms: synonym
        mesh_id: xrefMeSH
        fma_id: xrefFMA
        source_database: sourceDatabase

  # ---------------------------------------------------------------------------
  # MeSH - Medical Subject Headings
  # ---------------------------------------------------------------------------
  mesh.symptom_nodes:
    data_type: node
    node_type: Symptom
    source_filename: symptom_nodes.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: mesh_id
      data_property_map:
        mesh_id: xrefMeSH
        mesh_name: commonName
        sourceDatabase: sourceDatabase

  # ---------------------------------------------------------------------------
  # DrugCentral - Drug Information, Classification, and Effects
