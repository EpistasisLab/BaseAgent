      subject_node_type: Gene
      subject_column_name: entrez
      subject_match_property: xrefNcbiGene
      object_node_type: Pathway
      object_column_name: path_name
      object_match_property: pathwayName
      data_property_map:
        source_database: sourceDatabase

  # ---------------------------------------------------------------------------
  # BGEE - Anatomy Expresses Gene (anatomical expressions from Bgee database)
  # ---------------------------------------------------------------------------
  bgee.anatomy_expresses_gene:
    data_type: relationship
    relationship_type: anatomyExpressesGene
    inverse_relationship_type: null
    source_filename: anatomy_expresses_gene.tsv
    skip: false
    parse_config:
      headers: true
      subject_node_type: BodyPart
      subject_column_name: uberon_id
      subject_match_property: xrefUberon
      object_node_type: Gene
      object_column_name: ensembl_gene_id
      object_match_property: xrefEnsembl
      data_property_map:
        expression_call: expressionCall
        call_quality: callQuality
        fdr: fdr
        expression_score: expressionScore
        expression_rank: expressionRank
        unbiased: unbiased
        sourceDatabase: sourceDatabase

  # ---------------------------------------------------------------------------
  # CollectTRI relationships
  # ---------------------------------------------------------------------------
  collectri.tf_gene_interactions:
    data_type: relationship
    relationship_type: transcriptionFactorInteractsWithGene
    source_filename: tf_gene_interactions.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      subject_node_type: TranscriptionFactor
      subject_column_name: tf_symbol
      subject_match_property: TF
      object_node_type: Gene
      object_column_name: target_gene
      object_match_property: geneSymbol
      data_property_map:
        source_database: sourceDatabase

  # ---------------------------------------------------------------------------
  # DrugBank - Drug-Gene Binding Edges
  # ---------------------------------------------------------------------------
  drugbank.drug_gene_edges:
    data_type: relationship
    relationship_type: chemicalBindsGene
    source_filename: drug_gene_edges.tsv
    skip: false
    parse_config:
      headers: true
      subject_node_type: Drug
      subject_column_name: drugbank_id
      subject_match_property: xrefDrugbank
      object_node_type: Gene
      object_column_name: gene_symbol
      object_match_property: geneSymbol
      data_property_map:
        interaction_type: interactionType
        sourceDatabase: sourceDatabase

  # ---------------------------------------------------------------------------
  # DrugCentral - Drug Relationships
  # ---------------------------------------------------------------------------
  drugcentral.drug_treats_disease:
    data_type: relationship
    relationship_type: drugTreatsDisease
    source_filename: drug_treats_disease.tsv
    skip: false
    parse_config:
      headers: true
      subject_node_type: Drug
      subject_column_name: struct_id
      subject_match_property: xrefDrugCentralID
      object_node_type: Disease
      object_column_name: disease_id
      object_match_property: xrefUmlsCUI
      data_property_map:
        indication: indication
        source_database: sourceDatabase

  drugcentral.drug_in_class:
    data_type: relationship
    relationship_type: drugInClass
    source_filename: drug_in_class.tsv
    skip: false
    parse_config:
      headers: true
      subject_node_type: Drug
      subject_column_name: struct_id
      subject_match_property: xrefDrugCentralID
      object_node_type: DrugClass
      object_column_name: pharma_class_id
      object_match_property: xrefDrugCentralPharmClass
      data_property_map:
        source_database: sourceDatabase

  drugcentral.chemical_causes_effect:
    data_type: relationship
    relationship_type: chemicalCausesEffect
    source_filename: chemical_causes_effect.tsv
    skip: false
    parse_config:
      headers: true
      subject_node_type: Drug
      subject_column_name: struct_id
      subject_match_property: xrefDrugCentralID
      object_node_type: ChemicalEffect
      object_column_name: adverse_effect_id
      object_match_property: xrefMedDRA
      data_property_map:
        drug_ae: support
        source_database: sourceDatabase

  # ---------------------------------------------------------------------------
  # Gene Ontology - Gene-Biological Process Associations
  # ---------------------------------------------------------------------------
  gene_ontology.gene_bp_associations:
    data_type: relationship
    relationship_type: geneParticipatesInBiologicalProcess
    source_filename: gene_bp_associations.tsv
    skip: false
    parse_config:
      headers: true
      subject_node_type: Gene
      subject_column_name: gene_symbol
      subject_match_property: geneSymbol
      object_node_type: BiologicalProcess
      object_column_name: go_id
      object_match_property: xrefGeneOntology
