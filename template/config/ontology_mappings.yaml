  # ---------------------------------------------------------------------------
  # CTD - Chemical Information
  # ---------------------------------------------------------------------------
  ctd.chemical_nodes:
    data_type: node
    node_type: Drug
    source_filename: chemical_nodes.tsv
    merge: true
    skip: false
    parse_config:
      headers: true
      iri_column_name: chemical_id
      data_property_map:
        chemical_id: xrefMeSHSupplementary
        chemical_name: commonName
        cas_number: xrefCasRN
        pubchem_cid: xrefPubchemCID
        inchikey: inchiKey
        dtxsid: xrefDTXSID
        mesh_parent_ids: xrefMeSH
        source_database: sourceDatabase
      merge_column:
        data_property: xrefCasRN
        source_column_name: cas_number

  # ---------------------------------------------------------------------------
  # AOP-DB - Adverse Outcome Pathway Database
  # ---------------------------------------------------------------------------
  aopdb.drugs:
    data_type: node
    node_type: Drug
    source_filename: drugs.tsv
    merge: true
    skip: false
    parse_config:
      headers: true
      iri_column_name: DTX_id
      data_property_map:
        ChemicalID: xrefMeSHSupplementary
        source_database: sourceDatabase
      merge_column:
        source_column_name: DTX_id
        data_property: xrefDTXSID

  aopdb.pathways:
    data_type: node
    node_type: Pathway
    source_filename: pathways.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: path_iri
      data_property_map:
        path_id: pathwayId
        path_name: pathwayName
        ext_source: sourceDatabase
        source_database: sourceDatabase



  # RELATIONSHIP POPULATIONS
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # DisGeNET - Gene-Disease Associations
  # ---------------------------------------------------------------------------

  disgenet.gene_disease_associations:
    data_type: relationship
    relationship_type: geneAssociatesWithDisease
    source_filename: gene_disease_associations.tsv
    skip: false
    parse_config:
      headers: true
      subject_node_type: Gene
      subject_column_name: geneId
      subject_match_property: xrefNcbiGene
      object_node_type: Disease
      object_column_name: diseaseId
      object_match_property: xrefUmlsCUI
