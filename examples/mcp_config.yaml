# Example MCP Server Configuration
# Model Context Protocol server configuration for BaseAgent
#
# Two transport types are supported:
#   - Local (stdio): launches a subprocess via "command" field
#   - Remote (Streamable HTTP): connects to a URL via "url" field

mcp_servers:
  # --- Local servers (stdio transport) ---

  # Filesystem access
  filesystem:
    command:
      - "npx"
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "./"
      - "/Users/nawaza/Desktop/Cardio-KB"

  # GitHub MCP Server (Docker-based with auto-discovery)
  github:
    command: ["docker", "run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN", "ghcr.io/github/github-mcp-server"]
    enabled: false
    description: "Official GitHub MCP server for repository and issue management"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"

  # ToolUniverse - biomedical tools via stdio transport
  tooluniverse:
    command: ["uvx", "--refresh", "tooluniverse"]
    enabled: false
    env:
      PYTHONIOENCODING: "utf-8"

  # --- Remote servers (Streamable HTTP transport) ---

  # BioContext.ai knowledge base (no auth required)
  biocontext:
    url: https://biocontext-kb.fastmcp.app/mcp
    enabled: false
    type: remote

  # STRING database
  string_db:
    enabled: false
    url: https://mcp.string-db.org/
    type: remote

  # Remote server with auth headers (${ENV_VAR} interpolation)
  # private_api:
  #   url: https://mcp.example.com/mcp/
  #   headers:
  #     Authorization: "Bearer ${MY_API_KEY}"

